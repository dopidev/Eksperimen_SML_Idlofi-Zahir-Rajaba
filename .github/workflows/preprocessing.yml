name: Automated Data Preprocessing

on:
  push:
    paths:
      - 'customer_shopping_data_raw/**'
      - 'preprocessing/automate_*.py'
  workflow_dispatch:

jobs:
  preprocess:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn
      
      - name: Debug - show folder structure
        run: |
          pwd
          ls -la
          ls -la customer_shopping_data_raw/ || echo "Raw folder not found"
          ls -la preprocessing/ || echo "Preprocessing folder not found"
      
      - name: Run preprocessing
        run: |
          cd preprocessing
          python -c "import sys; print(sys.version)"
          python automate_Idlofi-Zahir-Rajaba.py --input ../customer_shopping_data_raw/customer_shopping_data.csv --output ../customer_shopping_data_preprocessing.csv
      
      - name: Verify output
        run: |
          if [ -f "customer_shopping_data_preprocessing.csv" ]; then
            echo "✅ Success! File created."
            wc -l customer_shopping_data_preprocessing.csv
            head -n 3 customer_shopping_data_preprocessing.csv
          else
            echo "❌ Output file not found!"
            exit 1
          fi
      
      - name: Commit results
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-preprocessing: update dataset"
          file_pattern: "*.csv *.txt"